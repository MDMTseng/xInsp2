<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    :root {
        --card-bg: var(--vscode-editor-background);
        --card-border: var(--vscode-widget-border, rgba(255,255,255,0.08));
        --muted: var(--vscode-descriptionForeground, #888);
    }
    body { font-family: var(--vscode-font-family, sans-serif); color: var(--vscode-foreground, #ccc); background: var(--vscode-sideBar-background, #1e1e1e); padding: 18px; margin: 0; font-size: 13px; line-height: 1.5; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .hint { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; padding: 16px 18px; margin-bottom: 14px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0 0 12px; }
    .field { display: grid; grid-template-columns: 110px 1fr; gap: 12px; align-items: center; margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    .field label { color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

    .preview { border: 1px solid var(--card-border); border-radius: 4px; background: #000; display: block; max-width: 100%; }
    .preview-empty { opacity: 0.5; font-style: italic; padding: 40px 12px; text-align: center; }
    .frame-meta { color: var(--muted); font-size: 11px; margin-top: 6px; font-family: var(--vscode-editor-font-family, monospace); }
</style>
</head>
<body>
    <div class="header">
        <h2>Mock Camera</h2>
        <vscode-badge id="stream-pill" variant="counter">stopped</vscode-badge>
    </div>
    <div class="hint">Synthesized frames for pipeline testing. Stream to drive downstream plugins.</div>

    <div class="card">
        <div class="card-title">Configuration</div>
        <div class="field">
            <label for="width">Width</label>
            <vscode-textfield id="width" type="number" value="640" min="32" max="4096"></vscode-textfield>
        </div>
        <div class="field">
            <label for="height">Height</label>
            <vscode-textfield id="height" type="number" value="480" min="32" max="4096"></vscode-textfield>
        </div>
        <div class="field">
            <label for="fps">FPS</label>
            <vscode-textfield id="fps" type="number" value="10" min="1" max="60"></vscode-textfield>
        </div>
        <div class="actions">
            <vscode-button id="btn-apply">Apply Settings</vscode-button>
            <vscode-button id="btn-start" icon="play">Start</vscode-button>
            <vscode-button id="btn-stop" secondary icon="debug-stop">Stop</vscode-button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Live Preview</div>
        <img id="previewImg" class="preview" style="display:none">
        <div id="noPreview" class="preview-empty">No preview — start streaming to see frames.</div>
        <div id="frameInfo" class="frame-meta"></div>
    </div>

<script>
    const vscode = acquireVsCodeApi();
    let isStreaming = false;
    let previewTimer = null;
    let frameCount = 0;

    function sendCmd(cmd) { vscode.postMessage({ type: 'exchange', cmd }); }

    document.getElementById('btn-start').addEventListener('click', () => sendCmd({ command: 'start' }));
    document.getElementById('btn-stop').addEventListener('click',  () => sendCmd({ command: 'stop' }));
    document.getElementById('btn-apply').addEventListener('click', () => {
        const w = parseInt(document.getElementById('width').value) || 640;
        const h = parseInt(document.getElementById('height').value) || 480;
        const f = parseInt(document.getElementById('fps').value) || 10;
        sendCmd({ command: 'set_resolution', width: w, height: h });
        sendCmd({ command: 'set_fps', value: f });
    });

    function updateStatus(streaming) {
        isStreaming = streaming;
        const pill = document.getElementById('stream-pill');
        pill.textContent = streaming ? 'streaming' : 'stopped';
        if (streaming && !previewTimer) {
            previewTimer = setInterval(() => vscode.postMessage({ type: 'request_preview' }), 200);
        } else if (!streaming && previewTimer) {
            clearInterval(previewTimer); previewTimer = null;
        }
    }

    window.addEventListener('message', (e) => {
        const msg = e.data;
        if (msg.type === 'status') {
            if (msg.width)  document.getElementById('width').value  = msg.width;
            if (msg.height) document.getElementById('height').value = msg.height;
            if (msg.fps)    document.getElementById('fps').value    = msg.fps;
            updateStatus(!!msg.streaming);
        } else if (msg.type === 'preview') {
            frameCount++;
            const img = document.getElementById('previewImg');
            img.src = 'data:image/jpeg;base64,' + msg.jpeg;
            img.style.display = 'block';
            document.getElementById('noPreview').style.display = 'none';
            document.getElementById('frameInfo').textContent =
                `${msg.width}×${msg.height}  ·  frame #${frameCount}`;
        }
    });

    sendCmd({ command: 'get_status' });
</script>
</body>
</html>
