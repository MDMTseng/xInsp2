<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body { font-family: var(--vscode-font-family, sans-serif); font-size: 13px; color: var(--vscode-foreground, #ccc); background: var(--vscode-editor-background, #1e1e1e); padding: 12px; margin: 0; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    label { min-width: 80px; }
    input[type=number] { width: 80px; padding: 4px; background: var(--vscode-input-background, #3c3c3c); color: var(--vscode-input-foreground, #ccc); border: 1px solid var(--vscode-input-border, #555); }
    button { padding: 6px 16px; cursor: pointer; border: none; border-radius: 3px; font-size: 13px; }
    .btn-start { background: #4caf50; color: white; }
    .btn-stop { background: #f44336; color: white; }
    .btn-apply { background: #2196f3; color: white; }
    .status { margin-top: 8px; padding: 6px 8px; background: var(--vscode-input-background, #3c3c3c); border-radius: 4px; font-size: 12px; }
    .streaming { color: #4caf50; font-weight: bold; }
    .stopped { color: #f44336; }
    .preview-container { margin-top: 12px; }
    .preview-img { max-width: 100%; border: 1px solid var(--vscode-widget-border, #444); background: #000; display: block; }
    .frame-info { font-size: 11px; opacity: 0.6; margin-top: 4px; }
</style>
</head>
<body>
    <h2>Mock Camera</h2>

    <div class="row">
        <label>Width:</label>
        <input type="number" id="width" value="640" min="32" max="4096">
    </div>
    <div class="row">
        <label>Height:</label>
        <input type="number" id="height" value="480" min="32" max="4096">
    </div>
    <div class="row">
        <label>FPS:</label>
        <input type="number" id="fps" value="10" min="1" max="60">
    </div>

    <div class="row" style="margin-top: 12px;">
        <button class="btn-start" onclick="doStart()">Start Streaming</button>
        <button class="btn-stop" onclick="doStop()">Stop Streaming</button>
        <button class="btn-apply" onclick="doApply()">Apply Settings</button>
    </div>

    <div class="status">
        Status: <span id="statusText" class="stopped">Stopped</span>
        <span id="frameInfo" class="frame-info"></span>
    </div>

    <div class="preview-container">
        <img id="previewImg" class="preview-img" style="display:none">
        <div id="noPreview" style="opacity:0.4; font-style:italic; margin-top:8px;">No preview — start streaming to see frames</div>
    </div>

<script>
    const vscode = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;
    let isStreaming = false;
    let previewTimer = null;
    let frameCount = 0;

    function sendCmd(cmd) {
        if (vscode) vscode.postMessage({ type: 'exchange', cmd: cmd });
    }

    function doStart() {
        sendCmd({ command: 'start' });
    }

    function doStop() {
        sendCmd({ command: 'stop' });
    }

    function doApply() {
        const w = parseInt(document.getElementById('width').value) || 640;
        const h = parseInt(document.getElementById('height').value) || 480;
        const f = parseInt(document.getElementById('fps').value) || 10;
        sendCmd({ command: 'set_resolution', width: w, height: h });
        sendCmd({ command: 'set_fps', value: f });
    }

    function updateStatus(streaming) {
        isStreaming = streaming;
        const el = document.getElementById('statusText');
        el.textContent = streaming ? 'Streaming' : 'Stopped';
        el.className = streaming ? 'streaming' : 'stopped';

        if (streaming && !previewTimer) {
            // Start polling for preview frames
            previewTimer = setInterval(() => {
                if (vscode) vscode.postMessage({ type: 'request_preview' });
            }, 200);
        }
        if (!streaming && previewTimer) {
            clearInterval(previewTimer);
            previewTimer = null;
        }
    }

    window.addEventListener('message', (e) => {
        const msg = e.data;
        if (msg.type === 'status') {
            if (msg.width) document.getElementById('width').value = msg.width;
            if (msg.height) document.getElementById('height').value = msg.height;
            if (msg.fps) document.getElementById('fps').value = msg.fps;
            updateStatus(!!msg.streaming);
        } else if (msg.type === 'preview') {
            frameCount++;
            const img = document.getElementById('previewImg');
            img.src = 'data:image/jpeg;base64,' + msg.jpeg;
            img.style.display = 'block';
            document.getElementById('noPreview').style.display = 'none';
            document.getElementById('frameInfo').textContent =
                ' | ' + msg.width + 'x' + msg.height + ' | frame #' + frameCount;
        }
    });

    // Request initial status
    sendCmd({ command: 'get_status' });
</script>
</body>
</html>
