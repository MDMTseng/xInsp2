<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    :root {
        --card-bg: var(--vscode-editor-background);
        --card-border: var(--vscode-widget-border, rgba(255,255,255,0.08));
        --muted: var(--vscode-descriptionForeground, #888);
    }
    body { font-family: var(--vscode-font-family, sans-serif); color: var(--vscode-foreground, #ccc); background: var(--vscode-sideBar-background, #1e1e1e); padding: 18px; margin: 0; font-size: 13px; line-height: 1.5; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .hint { color: var(--muted); font-size: 12px; margin-bottom: 16px; }

    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; padding: 16px 18px; margin-bottom: 14px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin: 0 0 12px; }

    .fields { display: grid; grid-template-columns: 1.2fr 0.9fr 1.6fr auto; gap: 8px; }
    .fields-head { display: contents; }
    .fields-head > div { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); padding: 2px 4px 8px; }

    .row { display: contents; }
    .row > * { align-self: center; }
    .row input[type=text], .row select {
        width: 100%; box-sizing: border-box;
        background: var(--vscode-input-background, #3c3c3c);
        color: var(--vscode-input-foreground, #ccc);
        border: 1px solid var(--vscode-input-border, transparent);
        border-radius: 3px; padding: 5px 8px; font-size: 12px;
        font-family: var(--vscode-font-family);
    }
    .row input.mono { font-family: var(--vscode-editor-font-family, monospace); }
    .row input:focus, .row select:focus { outline: 1px solid var(--vscode-focusBorder); outline-offset: -1px; }
    .row .cb-cell { display:flex; align-items:center; justify-content:flex-start; padding-left: 2px; }
    .row .null-cell { opacity: 0.5; font-style: italic; padding: 0 8px; font-family: var(--vscode-editor-font-family, monospace); font-size: 11px; }
    .row .rm { background: transparent; color: #f44336; border: none; cursor: pointer; padding: 2px 6px; font-size: 14px; border-radius: 3px; }
    .row .rm:hover { background: rgba(244, 67, 54, 0.15); }

    .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    .preview { background: var(--vscode-input-background, #2a2a2a); border: 1px solid var(--card-border); padding: 10px 12px; border-radius: 4px; font-family: var(--vscode-editor-font-family, monospace); font-size: 11px; line-height: 1.5; max-height: 220px; overflow: auto; white-space: pre-wrap; word-break: break-word; margin: 0; }

    .invalid { border-color: #f44336 !important; background: rgba(244, 67, 54, 0.15) !important; }
    .status-line { margin-top: 8px; font-size: 11px; color: var(--muted); }
    .status-line.ok  { color: #4caf50; }
    .status-line.err { color: #f44336; }
</style>
</head>
<body>
    <div class="header">
        <h2>JSON Source</h2>
        <vscode-badge id="count-pill" variant="counter">0 fields</vscode-badge>
    </div>
    <div class="hint">Define the JSON record this instance emits. Downstream plugins can override
        any field per-frame by passing <code>{key:".path", value:…}</code> in their input.</div>

    <div class="card">
        <div class="card-title">Fields</div>
        <div id="grid" class="fields">
            <div class="fields-head">
                <div>Key</div><div>Type</div><div>Value</div><div></div>
            </div>
        </div>
        <div class="actions">
            <vscode-button id="btn-add" icon="add">Add field</vscode-button>
            <vscode-button id="btn-apply">Apply</vscode-button>
            <vscode-button id="btn-reset" secondary>Reset</vscode-button>
        </div>
        <div class="status-line" id="status">&nbsp;</div>
    </div>

    <div class="card">
        <div class="card-title">Preview (emitted record)</div>
        <pre class="preview" id="preview">{}</pre>
    </div>

<script>
    const vscode = acquireVsCodeApi();
    const TYPES = ['string', 'number', 'bool', 'null', 'object', 'array'];

    // In-memory rows: [{key, type, value}]
    let rows = [];

    function send(cmd) { vscode.postMessage({ type: 'exchange', cmd }); }

    function el(tag, attrs, ...kids) {
        const e = document.createElement(tag);
        for (const k in attrs) {
            if (k === 'on') for (const ev in attrs.on) e.addEventListener(ev, attrs.on[ev]);
            else if (k === 'style') Object.assign(e.style, attrs.style);
            else if (k === 'class') e.className = attrs[k];
            else e.setAttribute(k, attrs[k]);
        }
        for (const c of kids) if (c != null) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        return e;
    }

    function render() {
        const grid = document.getElementById('grid');
        // Remove all rows (but keep the head)
        while (grid.children.length > 1) grid.removeChild(grid.lastElementChild);

        rows.forEach((row, i) => {
            const rowEl = el('div', { class: 'row' });

            // Key
            const keyInp = el('input', {
                type: 'text', value: row.key || '', placeholder: 'field_name',
                on: { input: e => { rows[i].key = e.target.value; updatePreview(); } },
            });
            // Type
            const typeSel = el('select', {
                on: { change: e => { rows[i].type = e.target.value; render(); } },
            });
            for (const t of TYPES) {
                const opt = el('option', { value: t }, t);
                if (t === row.type) opt.selected = true;
                typeSel.appendChild(opt);
            }
            // Value
            let valEl;
            if (row.type === 'bool') {
                const cb = el('input', {
                    type: 'checkbox',
                    on: { change: e => { rows[i].value = e.target.checked ? 'true' : 'false'; updatePreview(); } },
                });
                if (row.value === 'true') cb.checked = true;
                valEl = el('div', { class: 'cb-cell' }, cb);
            } else if (row.type === 'null') {
                valEl = el('div', { class: 'null-cell' }, 'null');
            } else {
                const placeholder = row.type === 'number' ? '42' :
                                    row.type === 'object' ? '{"a":1}' :
                                    row.type === 'array'  ? '[1,2,3]' : 'text';
                const klass = (row.type === 'object' || row.type === 'array' || row.type === 'number') ? 'mono' : '';
                valEl = el('input', {
                    type: 'text', value: row.value || '', placeholder, class: klass,
                    on: { input: e => { rows[i].value = e.target.value; updatePreview(); } },
                });
            }
            // Remove
            const rm = el('button', {
                class: 'rm', title: 'Remove field',
                on: { click: () => { rows.splice(i, 1); render(); } },
            }, '✕');

            // Grid: append 4 direct children
            const grid = document.getElementById('grid');
            grid.appendChild(keyInp);
            grid.appendChild(typeSel);
            grid.appendChild(valEl);
            grid.appendChild(rm);
        });
        updatePreview();
    }

    function buildJson() {
        const obj = {};
        let err = false;
        const inputs = document.querySelectorAll('#grid > input[type=text]');
        inputs.forEach(i => i.classList.remove('invalid'));
        // The input order in DOM: k, v, k, v, k, v … (type selects + rm are separate selectors)
        // But we can't easily map by position — track errors by rebuilding with try/catch.
        for (let i = 0; i < rows.length; ++i) {
            const r = rows[i];
            if (!r.key) continue;
            try {
                if (r.type === 'string')      obj[r.key] = r.value || '';
                else if (r.type === 'number') obj[r.key] = Number(r.value);
                else if (r.type === 'bool')   obj[r.key] = r.value === 'true';
                else if (r.type === 'null')   obj[r.key] = null;
                else if (r.type === 'object' || r.type === 'array') {
                    obj[r.key] = JSON.parse(r.value || (r.type === 'array' ? '[]' : '{}'));
                }
            } catch { err = true; }
        }
        return { obj, err };
    }

    function updatePreview() {
        const { obj, err } = buildJson();
        document.getElementById('preview').textContent = JSON.stringify(obj, null, 2);
        document.getElementById('count-pill').textContent =
            `${Object.keys(obj).length} field${Object.keys(obj).length === 1 ? '' : 's'}`;
        const line = document.getElementById('status');
        if (err) { line.textContent = 'JSON parse error in one of the object/array values'; line.className = 'status-line err'; }
        else     { line.innerHTML = '&nbsp;'; line.className = 'status-line'; }
    }

    function addRow() {
        rows.push({ key: 'field' + (rows.length + 1), type: 'string', value: '' });
        render();
    }

    function apply() {
        const { obj, err } = buildJson();
        if (err) { document.getElementById('status').textContent = 'Fix parse error before applying'; return; }
        send({ command: 'set_data', value: obj });
        const s = document.getElementById('status');
        s.textContent = `Applied at ${new Date().toLocaleTimeString()}`;
        s.className = 'status-line ok';
    }

    function resetAll() {
        rows = [];
        render();
        send({ command: 'reset' });
        const s = document.getElementById('status');
        s.textContent = 'Reset';
        s.className = 'status-line ok';
    }

    function loadFromObject(obj) {
        rows = [];
        for (const k in obj) {
            const v = obj[k];
            if (v === null)               rows.push({ key: k, type: 'null', value: '' });
            else if (typeof v === 'boolean') rows.push({ key: k, type: 'bool', value: v ? 'true' : 'false' });
            else if (typeof v === 'number')  rows.push({ key: k, type: 'number', value: String(v) });
            else if (typeof v === 'string')  rows.push({ key: k, type: 'string', value: v });
            else if (Array.isArray(v))       rows.push({ key: k, type: 'array', value: JSON.stringify(v) });
            else if (typeof v === 'object')  rows.push({ key: k, type: 'object', value: JSON.stringify(v) });
        }
        render();
    }

    document.getElementById('btn-add').addEventListener('click', addRow);
    document.getElementById('btn-apply').addEventListener('click', apply);
    document.getElementById('btn-reset').addEventListener('click', resetAll);

    window.addEventListener('message', (e) => {
        if (e.data.type === 'status' && e.data.data && typeof e.data.data === 'object') {
            loadFromObject(e.data.data);
        }
    });

    send({ command: 'get_status' });
    setTimeout(() => { if (rows.length === 0) addRow(); }, 250);
</script>
</body>
</html>
