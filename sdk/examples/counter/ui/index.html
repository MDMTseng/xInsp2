<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body { font-family: var(--vscode-font-family, sans-serif); font-size: 13px; color: var(--vscode-foreground, #ccc); background: var(--vscode-editor-background, #1e1e1e); padding: 12px; margin: 0; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .big { font-size: 48px; font-weight: bold; color: #4fc3f7; text-align: center; margin: 20px 0; }
    button { padding: 6px 14px; cursor: pointer; border: none; border-radius: 3px; font-size: 12px; background: #f44336; color: white; }
    .hint { font-size: 11px; opacity: 0.6; margin-top: 16px; }
</style>
</head>
<body>
    <h2>Counter</h2>
    <div class="big" id="count">0</div>
    <div style="text-align:center"><button onclick="reset()">Reset</button></div>
    <div class="hint">Counter increments on every inspection. Reload the script or reopen the project — the count persists.</div>

<script>
    const vscode = acquireVsCodeApi();
    function reset() { vscode.postMessage({ type: 'exchange', cmd: { command: 'reset' } }); }
    window.addEventListener('message', e => {
        if (e.data.type === 'status' && 'count' in e.data) {
            document.getElementById('count').textContent = e.data.count;
        }
    });
    vscode.postMessage({ type: 'exchange', cmd: { command: 'get_status' } });
    // Also poll so the UI reflects live changes from the inspection thread
    setInterval(() => {
        vscode.postMessage({ type: 'exchange', cmd: { command: 'get_status' } });
    }, 500);
</script>
</body>
</html>
