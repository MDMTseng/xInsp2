<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body { font-family: var(--vscode-font-family, sans-serif); font-size: 13px; color: var(--vscode-foreground, #ccc); background: var(--vscode-editor-background, #1e1e1e); padding: 12px; margin: 0; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .hint { font-size: 11px; opacity: 0.6; margin-bottom: 8px; }
    canvas { background: #111; border: 1px solid #333; display: block; width: 100%; height: 220px; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px 16px; margin-top: 10px; font-size: 12px; }
    .stats .k { opacity: 0.6; }
    .stats .v { text-align: right; font-family: monospace; }
</style>
</head>
<body>
    <h2>Histogram</h2>
    <div class="hint">Drives after every inspection. Feed this an image via <code>histogram0.process(Record().image("src", img))</code>.</div>
    <canvas id="hist" width="256" height="220"></canvas>
    <div class="stats">
        <div class="k">Pixels</div>        <div class="v" id="pixels">–</div>
        <div class="k">Mean</div>          <div class="v" id="mean">–</div>
        <div class="k">Std dev</div>       <div class="v" id="stddev">–</div>
        <div class="k">Peak bin</div>      <div class="v" id="peak">–</div>
    </div>

<script>
    const vscode = acquireVsCodeApi();
    const canvas = document.getElementById('hist');
    const ctx = canvas.getContext('2d');

    function draw(counts) {
        const max = Math.max(1, ...counts);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#4fc3f7';
        const w = canvas.width / 256;
        for (let i = 0; i < 256; ++i) {
            const h = (counts[i] / max) * canvas.height;
            ctx.fillRect(i * w, canvas.height - h, w, h);
        }
    }

    function fmt(v, d) { return (typeof v === 'number') ? v.toFixed(d) : '–'; }

    window.addEventListener('message', e => {
        const m = e.data;
        if (m.type === 'status' || m.type === 'process_result') {
            if (Array.isArray(m.counts)) draw(m.counts);
            document.getElementById('pixels').textContent = m.pixels ?? '–';
            document.getElementById('mean').textContent   = fmt(m.mean,   2);
            document.getElementById('stddev').textContent = fmt(m.stddev, 2);
            document.getElementById('peak').textContent =
                (m.peak_bin != null) ? `${m.peak_bin} (${m.peak_count})` : '–';
        }
    });

    // Poll: ask for fresh output every 500ms. The extension's wrapper
    // forwards preview/process results back as {type:'process_result'}.
    setInterval(() => {
        vscode.postMessage({ type: 'request_process', cmd: { command: 'get_status' } });
    }, 500);
</script>
</body>
</html>
