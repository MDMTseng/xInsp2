<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    :root {
        --card-bg: var(--vscode-editor-background);
        --card-border: var(--vscode-widget-border, rgba(255,255,255,0.08));
        --muted: var(--vscode-descriptionForeground, #888);
    }
    body {
        font-family: var(--vscode-font-family, system-ui, sans-serif);
        color: var(--vscode-foreground, #ccc);
        background: var(--vscode-sideBar-background, #1e1e1e);
        margin: 0;
        padding: 18px;
        font-size: 13px;
        line-height: 1.5;
    }
    .header {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 4px;
    }
    .header h2 { margin: 0; font-size: 16px; font-weight: 600; }
    .hint { color: var(--muted); font-size: 12px; margin-bottom: 18px; }

    .card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 6px;
        padding: 16px 18px;
        margin-bottom: 14px;
    }
    .card-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
        margin: 0 0 12px;
    }
    .field {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 12px;
        align-items: center;
        margin-bottom: 10px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label { color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 18px;
        font-size: 12px;
    }
    .stat-grid .k { color: var(--muted); }
    .stat-grid .v { font-family: var(--vscode-editor-font-family, monospace); }
    .stat-grid .v.wide { grid-column: 1 / -1; word-break: break-all; }

    vscode-badge { margin-left: 6px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot.ok { background: #4caf50; }
    .dot.off { background: #757575; }
</style>
</head>
<body>
    <div class="header">
        <h2>My Plugin</h2>
        <vscode-badge id="status-pill" variant="counter">idle</vscode-badge>
    </div>
    <div class="hint">Threshold + invert demo. Drives the C++ exchange handler — patterns 2, 3, 5.</div>

    <div class="card">
        <div class="card-title">Parameters</div>
        <div class="field">
            <label for="threshold">Threshold</label>
            <vscode-textfield id="threshold" type="number" value="128" min="0" max="255"></vscode-textfield>
        </div>
        <div class="field">
            <label for="invert">Invert</label>
            <vscode-checkbox id="invert" label=""></vscode-checkbox>
        </div>
        <div class="actions">
            <vscode-button id="btn-apply">Apply</vscode-button>
            <vscode-button id="btn-save" secondary>Save last result</vscode-button>
            <vscode-button id="btn-reset" secondary>Reset</vscode-button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Runtime</div>
        <div class="stat-grid">
            <div class="k">Threshold</div>     <div class="v" id="s-thresh">—</div>
            <div class="k">Invert</div>        <div class="v" id="s-invert">—</div>
            <div class="k">Frames processed</div> <div class="v" id="s-frames">—</div>
            <div class="k">Last save</div>     <div class="v wide" id="s-save">—</div>
            <div class="k">Instance folder</div> <div class="v wide" id="s-folder" style="font-size:11px">—</div>
        </div>
    </div>

<script>
    // -------------------------------------------------------------------
    //  webview ↔ C++ plugin: the round-trip protocol
    // -------------------------------------------------------------------
    //  1. User clicks a button → we call send({command:'...', value:...}).
    //  2. vscode.postMessage delivers it to the extension wrapper.
    //  3. Extension forwards to backend → plugin.exchange(json).
    //  4. Plugin parses, mutates state, returns get_def() as JSON.
    //  5. Extension posts the result back here as {type:'status', ...}.
    //  6. Our message listener updates DOM from the fields it cares about.
    //
    //  State changes propagate via the 'status' message, even if no field
    //  actually changed — treat your UI as a re-render-from-status function.
    // -------------------------------------------------------------------
    const vscode = acquireVsCodeApi();
    function send(cmd) { vscode.postMessage({ type: 'exchange', cmd }); }

    function val(id) { return document.getElementById(id).value; }
    function checked(id) { return document.getElementById(id).checked; }

    // Outbound: every action funnels through here.
    document.getElementById('btn-apply').addEventListener('click', () => {
        send({ command: 'set_threshold', value: parseInt(val('threshold')) || 0 });
        send({ command: 'set_invert',    value: checked('invert') });
    });
    document.getElementById('btn-save').addEventListener('click', () => {
        send({ command: 'save_threshold_image' });
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
        send({ command: 'reset' });
    });

    // Inbound: the extension wraps the plugin's exchange() return value
    // as {type:'status', ...parsed_json}. Read whichever fields you care
    // about; missing ones won't hurt because the C++ side always emits
    // the full state via get_def().
    window.addEventListener('message', (e) => {
        const m = e.data;
        if (m.type !== 'status') return;
        if ('threshold'        in m) {
            document.getElementById('threshold').value = m.threshold;
            document.getElementById('s-thresh').textContent = m.threshold;
        }
        if ('invert' in m) {
            document.getElementById('invert').checked = m.invert;
            document.getElementById('s-invert').innerHTML =
                `<span class="dot ${m.invert?'ok':'off'}"></span>${m.invert ? 'on' : 'off'}`;
        }
        if ('frames_processed' in m) document.getElementById('s-frames').textContent = m.frames_processed;
        if ('last_save_path'   in m) document.getElementById('s-save').textContent  = m.last_save_path || '—';
        if ('folder'           in m) document.getElementById('s-folder').textContent = m.folder || '(detached)';
        const pill = document.getElementById('status-pill');
        if (pill) pill.textContent = (m.frames_processed > 0) ? `${m.frames_processed} frames` : 'idle';
    });

    // Initial render: unknown command falls through to get_def() in C++.
    send({ command: 'get_status' });
</script>
</body>
</html>
