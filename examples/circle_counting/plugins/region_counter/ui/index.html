<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: var(--vscode-font-family, system-ui); color: var(--vscode-foreground, #ccc);
       background: var(--vscode-sideBar-background, #1e1e1e); padding: 16px; font-size: 13px; }
h2 { margin: 0 0 4px; font-size: 16px; }
.hint { color: #888; margin-bottom: 14px; font-size: 12px; }
.card { background: var(--vscode-editor-background); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 6px; padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase;
              letter-spacing: 0.6px; color: #888; margin-bottom: 10px; }
.field { display: grid; grid-template-columns: 130px 1fr 70px; gap: 10px; align-items: center; margin-bottom: 8px; }
.field label { color: #888; }
.field input[type=range] { width: 100%; }
.field .num { font-family: monospace; text-align: right; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
button { background: var(--vscode-button-background, #0e639c); color: var(--vscode-button-foreground, #fff);
         border: none; padding: 5px 14px; border-radius: 3px; font-size: 12px; cursor: pointer; }
button.secondary { background: var(--vscode-button-secondaryBackground, #3a3d41); }
.stat { display: grid; grid-template-columns: 130px 1fr; gap: 10px; font-size: 12px; }
.stat .k { color: #888; }
.stat .v { font-family: monospace; }
.big { font-size: 24px; font-weight: 600; color: #4caf50; }
</style>
</head>
<body>
<h2>Region Counter</h2>
<div class="hint">Morphological close → connected-components → area filter.
The numeric breakdown helps you tell whether <code>min_area</code> /
<code>max_area</code> are clipping real targets vs noise.</div>

<div class="card">
  <div class="card-title">Parameters</div>
  <div class="field">
    <label>Close radius</label>
    <input type="range" id="close" min="0" max="12" step="1">
    <div class="num" id="close-v">2</div>
  </div>
  <div class="field">
    <label>Min area (px)</label>
    <input type="range" id="min" min="0" max="5000" step="10">
    <div class="num" id="min-v">300</div>
  </div>
  <div class="field">
    <label>Max area (px)</label>
    <input type="range" id="max" min="100" max="20000" step="50">
    <div class="num" id="max-v">4000</div>
  </div>
  <div class="actions">
    <button id="apply">Apply</button>
    <button id="reset" class="secondary">Reset</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Last run</div>
  <div style="text-align:center;margin-bottom:12px">
    <div style="color:#888;font-size:11px">COUNT</div>
    <div class="big" id="s-count">—</div>
  </div>
  <div class="stat">
    <div class="k">Total regions</div>     <div class="v" id="s-total">—</div>
    <div class="k">Rejected (too small)</div> <div class="v" id="s-small">—</div>
    <div class="k">Rejected (too big)</div>   <div class="v" id="s-big">—</div>
    <div class="k">Frames processed</div>  <div class="v" id="s-frames">—</div>
  </div>
</div>

<script>
  const vscode = acquireVsCodeApi();
  const send = (cmd) => vscode.postMessage({ type: 'exchange', cmd });
  const $ = id => document.getElementById(id);
  const wire = (id, vid) => $(id).addEventListener('input', () => $(vid).textContent = $(id).value);
  wire('close', 'close-v'); wire('min', 'min-v'); wire('max', 'max-v');

  $('apply').onclick = () => {
    send({ command: 'set_close_radius', value: parseInt($('close').value) });
    send({ command: 'set_min_area',     value: parseInt($('min').value)   });
    send({ command: 'set_max_area',     value: parseInt($('max').value)   });
  };
  $('reset').onclick = () => send({ command: 'reset' });

  window.addEventListener('message', (e) => {
    const m = e.data;
    if (m.type !== 'status') return;
    if ('close_radius' in m) { $('close').value = m.close_radius; $('close-v').textContent = m.close_radius; }
    if ('min_area'     in m) { $('min').value = m.min_area;       $('min-v').textContent   = m.min_area; }
    if ('max_area'     in m) { $('max').value = m.max_area;       $('max-v').textContent   = m.max_area; }
    if ('last_count'   in m) $('s-count').textContent = m.last_count;
    if ('last_total'   in m) $('s-total').textContent = m.last_total;
    if ('last_small'   in m) $('s-small').textContent = m.last_small;
    if ('last_big'     in m) $('s-big').textContent   = m.last_big;
    if ('frames_processed' in m) $('s-frames').textContent = m.frames_processed;
  });

  send({ command: 'get_status' });
</script>
</body>
</html>
